principles:
  - name: Visibility
    description: Cost visibility flows through Syneos contracted reporting; there is no self-service usage API.
  - name: Allocation
    description: Allocation follows the trial / program codes defined in the customer's CRO engagement.
  - name: Optimization
    description: Optimization levers are contractual (scope changes, study consolidation, deliverable reuse).
